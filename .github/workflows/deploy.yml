name: Build and deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out parent and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: false

      - name: Test and build backend
        working-directory: backend
        run: |
          go test ./...
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o ../artifacts/backend .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Check worker
        run: python -m py_compile worker/worker.py

      - name: Package release artifacts
        run: |
          tar -czf artifacts/backend.tar.gz -C artifacts backend
          tar -czf artifacts/frontend.tar.gz -C frontend/.next/standalone . -C "$GITHUB_WORKSPACE/frontend" .next/static
          (cd worker && zip -r ../artifacts/worker.zip . -x '.git/*')
          rm artifacts/backend

      - name: Upload immutable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.sha }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 14

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    env:
      BACKEND_HOST: ${{ secrets.BACKEND_HOST }}
      BACKEND_USER: ${{ secrets.BACKEND_USER }}
      BACKEND_HEALTH_URL: ${{ secrets.BACKEND_HEALTH_URL }}
      FRONTEND_HOST: ${{ secrets.FRONTEND_HOST }}
      FRONTEND_USER: ${{ secrets.FRONTEND_USER }}
      FRONTEND_HEALTH_URL: ${{ secrets.FRONTEND_HEALTH_URL }}
      WINDOWS_HOST: ${{ secrets.WINDOWS_HOST }}
      WINDOWS_USER: ${{ secrets.WINDOWS_USER }}
    steps:
      - name: Check out deployment code
        uses: actions/checkout@v4

      - name: Download immutable artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-${{ github.sha }}
          path: artifacts

      - name: Configure SSH
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          SSH_KEY_FILE="${RUNNER_TEMP}/deploy_key"
          KNOWN_HOSTS_FILE="${RUNNER_TEMP}/known_hosts"
          install -m 0700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > "$SSH_KEY_FILE"
          chmod 0600 "$SSH_KEY_FILE"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$KNOWN_HOSTS_FILE"
          chmod 0600 "$KNOWN_HOSTS_FILE"
          printf 'SSH_KEY_FILE=%s\nKNOWN_HOSTS_FILE=%s\n' "$SSH_KEY_FILE" "$KNOWN_HOSTS_FILE" >> "$GITHUB_ENV"

      - name: Deploy and coordinate rollback
        run: bash deploy/orchestrate.sh
